name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ========== 1. 准备 ==========
      - name: 准备 - 检出代码
        uses: actions/checkout@v4

      - name: 准备 - 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 准备 - 配置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 准备 - 设置 gradlew 权限
        run: chmod +x gradlew

      # ========== 2. 编译 ==========
      - name: 编译 - Gradle Build
        run: ./gradlew build

      # ========== 3. 上传 ==========
      - name: 上传 - 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 32kLimiter
          path: build/libs/*.jar
